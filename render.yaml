services:
  - type: web
    name: neurosyn-copilot
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: MONGODB_URI
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: LOCAL_LLM_BASE_URL
        sync: false
      - key: LOCAL_LLM_MODEL
        sync: false